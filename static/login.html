<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A-Wave | Secure Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0e17; }
        .login-box { width: 350px; padding: 40px; text-align: center; border: 1px solid #334155; border-radius: 12px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #334155; color: white; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #06b6d4; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s;}
        button:hover { background: #0891b2; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        h2 { color: #06b6d4; font-family: 'Courier New', monospace; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>A-WAVE SOC</h2>
        <p style="color:#94a3b8; font-size: 0.9rem; margin-bottom:20px;">Restricted Access / Authorized Personnel Only</p>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">AUTHENTICATE</button>
        </form>
        <p id="errorMsg" style="color:#ef4444; margin-top:15px; font-size:0.8rem; height: 20px;"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });

            const data = await res.json();
            if(data.success) {
                sessionStorage.setItem('role', data.role);
                sessionStorage.setItem('user', data.username);
                window.location.href = '/dashboard';
            } else {
                document.getElementById('errorMsg').innerText = "ACCESS DENIED: Invalid Credentials";
            }
        });
    </script>
</body>
</html>
